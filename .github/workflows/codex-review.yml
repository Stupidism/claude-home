name: Trigger Codex Review

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to trigger @codex review on"
        required: true
        type: string

permissions:
  contents: read

jobs:
  trigger:
    if: >-
      (github.event_name == 'workflow_dispatch' &&
       format('{0}', github.event.sender.id) == vars.CODEX_REVIEW_REQUESTER_ID) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       format('{0}', github.event.comment.user.id) == vars.CODEX_REVIEW_REQUESTER_ID &&
       github.event.comment.body == 'SunStupic: @codex review')
    runs-on: ubuntu-latest
    steps:
      - name: Post @codex review comment as Stupidism
        env:
          GH_TOKEN: ${{ secrets.STUPIDISM_TOKEN }}
          PR_NUMBER: ${{ github.event.inputs.pr_number || github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "STUPIDISM_TOKEN secret is not configured" >&2
            exit 1
          fi
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "@codex review"
